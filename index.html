<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo B2B - Jogos de Tabuleiro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1f2937;
            --primary-light: #374151;
            --accent-color: #059669;
            --accent-light: #10b981;
            --danger-color: #dc2626;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --white: #ffffff;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--gray-100);
            color: var(--gray-700);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }

        header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 32px 16px;
            box-shadow: var(--shadow);
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .filters-section {
            background-color: var(--white);
            padding: 24px 16px;
            margin: 24px 0;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .filters-wrapper {
            display: grid;
            gap: 16px;
            grid-template-columns: 1fr 1fr;
        }

        @media (min-width: 768px) {
            .filters-wrapper {
                grid-template-columns: 2fr 1fr;
            }
        }

        .search-box, .filter-select {
            padding: 12px 16px;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .search-box:focus, .filter-select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        .search-box {
            width: 100%;
        }

        .filter-select {
            width: 100%;
        }

        .loading {
            text-align: center;
            padding: 60px 16px;
        }

        .spinner {
            border: 4px solid var(--gray-200);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 16px;
            border-radius: 6px;
            margin: 24px 0;
            text-align: center;
        }

        .error-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin: 24px 0;
        }

        @media (min-width: 640px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .games-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .game-card {
            background-color: var(--white);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .card-image {
            width: 100%;
            height: 200px;
            background-color: var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gray-300) 0%, var(--gray-200) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-600);
            font-size: 13px;
            text-align: center;
            padding: 16px;
            font-weight: 500;
        }

        .card-header {
            padding: 16px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
            flex: 1;
            word-break: break-word;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge-available {
            background-color: #d1fae5;
            color: #065f46;
        }

        .badge-unavailable {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .card-content {
            padding: 16px;
            flex: 1;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .info-label {
            color: var(--gray-600);
            font-weight: 500;
        }

        .info-value {
            color: var(--primary-color);
            font-weight: 600;
        }

        .price {
            font-size: 20px;
            color: var(--accent-color);
            font-weight: 700;
            margin: 16px 0;
        }

        .category-tag {
            display: inline-block;
            background-color: var(--gray-200);
            color: var(--gray-700);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .category-chip {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--gray-200);
            color: var(--gray-700);
            border: none;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .category-chip:hover {
            background-color: var(--gray-300);
        }

        .category-chip.active {
            background-color: var(--primary-color);
            color: var(--white);
        }

        .category-chip.active:hover {
            background-color: var(--primary-light);
        }

        .card-footer {
            padding: 16px;
            border-top: 1px solid var(--gray-200);
        }

        .btn-whatsapp {
            width: 100%;
            padding: 12px 16px;
            background-color: #25d366;
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        .btn-whatsapp:hover {
            background-color: #1fa857;
        }

        .btn-whatsapp:active {
            transform: scale(0.98);
        }

        .empty-state {
            text-align: center;
            padding: 60px 16px;
            color: var(--gray-600);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--gray-700);
        }

        footer {
            background-color: var(--primary-color);
            color: var(--white);
            text-align: center;
            padding: 24px 16px;
            margin-top: 48px;
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Catálogo B2B</h1>
            <p>Jogos de tabuleiro para parcerias comerciais</p>
        </div>
    </header>

    <div class="container">
        <div class="filters-section">
            <div class="filters-wrapper">
                <div>
                    <label for="searchInput" style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--gray-700);">Buscar por nome</label>
                    <input
                        type="text"
                        id="searchInput"
                        class="search-box"
                        placeholder="Digite o nome do jogo..."
                        aria-label="Buscar jogos por nome"
                    >
                </div>
                <div>
                    <label for="categoryFilter" style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--gray-700);">Categoria</label>
                    <select id="categoryFilter" class="filter-select" aria-label="Filtrar por categoria">
                        <option value="">Todas as categorias</option>
                    </select>
                </div>
                <div>
                    <label for="sortFilter" style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--gray-700);">Ordenar por</label>
                    <select id="sortFilter" class="filter-select" aria-label="Ordenar resultados">
                        <option value="relevancia">Relevância</option>
                        <option value="menor-preco">Menor preço</option>
                        <option value="maior-preco">Maior preço</option>
                        <option value="a-z">A-Z</option>
                        <option value="z-a">Z-A</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="categoryChips" style="display: flex; gap: 8px; overflow-x: auto; padding: 16px; background-color: var(--white); border-radius: 8px; margin: 24px 0; box-shadow: var(--shadow);"></div>

        <div id="loading" class="loading" style="display: none;" role="status" aria-live="polite" aria-busy="true">
            <div class="spinner"></div>
            <p>Carregando catálogo...</p>
        </div>

        <div id="error" class="error" style="display: none;">
            <div class="error-icon">⚠</div>
            <p id="errorMessage"></p>
        </div>

        <div id="gamesContainer" class="games-grid"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon">🎲</div>
            <h2>Nenhum jogo encontrado</h2>
            <p>Tente ajustar seus filtros de busca</p>
        </div>
    </div>

    <footer>
        <p>Catálogo atualizado dinamicamente • Desenvolvido para parcerias B2B</p>
    </footer>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1s8ivVNesxRI9b_Vqh9cFJviKXnWlwrhV8FZWPIiM77s/export?format=csv';
        const WHATSAPP_NUMBER = '5541991767770';

        let allGames = [];
        let filteredGames = [];

        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const errorMessageEl = document.getElementById('errorMessage');
        const gamesContainerEl = document.getElementById('gamesContainer');
        const emptyStateEl = document.getElementById('emptyState');
        const searchInputEl = document.getElementById('searchInput');
        const categoryFilterEl = document.getElementById('categoryFilter');
        const sortFilterEl = document.getElementById('sortFilter');
        const categoryChipsEl = document.getElementById('categoryChips');

        function loadGames() {
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            gamesContainerEl.innerHTML = '';

            if (typeof Papa !== 'undefined') {
                Papa.parse(CSV_URL, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        processGames(results.data);
                    },
                    error: function(error) {
                        loadWithFallback();
                    }
                });
            } else {
                loadWithFallback();
            }
        }

        function loadWithFallback() {
            fetch(CSV_URL)
                .then(response => response.text())
                .then(csvText => {
                    const games = parseCSV(csvText);
                    processGames(games);
                })
                .catch(error => {
                    showError('Erro ao carregar catálogo. Tente novamente mais tarde.');
                    loadingEl.style.display = 'none';
                });
        }

        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim());
            const games = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const values = [];
                let currentValue = '';
                let insideQuotes = false;

                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        insideQuotes = !insideQuotes;
                    } else if (char === ',' && !insideQuotes) {
                        values.push(currentValue.trim().replace(/^"|"$/g, ''));
                        currentValue = '';
                    } else {
                        currentValue += char;
                    }
                }
                values.push(currentValue.trim().replace(/^"|"$/g, ''));

                const game = {};
                headers.forEach((header, index) => {
                    game[header] = values[index] || '';
                });

                if (game.nome) {
                    games.push(game);
                }
            }

            return games;
        }

        function processGames(games) {
            allGames = games.filter(game => game.nome && game.nome.trim());

            if (allGames.length === 0) {
                showError('Nenhum jogo encontrado na planilha');
                loadingEl.style.display = 'none';
                return;
            }

            populateCategories();
            applyFilters();
            loadingEl.style.display = 'none';
        }

        function populateCategories() {
            const categories = [...new Set(allGames.map(g => g.categoria).filter(c => c))];
            categories.sort();

            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categoryFilterEl.appendChild(option);
            });

            renderCategoryChips();
        }

        function renderCategoryChips() {
            categoryChipsEl.innerHTML = '';

            const categories = [...new Set(allGames.map(g => g.categoria).filter(c => c))];
            categories.sort();

            const allChip = document.createElement('button');
            allChip.className = 'category-chip active';
            allChip.textContent = 'Todos';
            allChip.onclick = function() {
                categoryFilterEl.value = '';
                applyFilters();
            };
            categoryChipsEl.appendChild(allChip);

            categories.forEach(category => {
                const chip = document.createElement('button');
                chip.className = 'category-chip';
                chip.textContent = category;
                chip.dataset.category = category;
                chip.onclick = function() {
                    categoryFilterEl.value = category;
                    applyFilters();
                };
                categoryChipsEl.appendChild(chip);
            });

            updateCategoryChipsActive();
        }

        function updateCategoryChipsActive() {
            const selectedCategory = categoryFilterEl.value;
            const chips = categoryChipsEl.querySelectorAll('.category-chip');

            chips.forEach(chip => {
                if (selectedCategory === '' && chip.textContent === 'Todos') {
                    chip.classList.add('active');
                } else if (selectedCategory !== '' && chip.dataset.category === selectedCategory) {
                    chip.classList.add('active');
                } else {
                    chip.classList.remove('active');
                }
            });
        }

        function sortGames(games) {
            const sortType = sortFilterEl.value;

            const gamesCopy = [...games];

            switch (sortType) {
                case 'menor-preco':
                    gamesCopy.sort((a, b) => {
                        const precoA = parseFloat(a.preco_venda) || 0;
                        const precoB = parseFloat(b.preco_venda) || 0;
                        return precoA - precoB;
                    });
                    break;
                case 'maior-preco':
                    gamesCopy.sort((a, b) => {
                        const precoA = parseFloat(a.preco_venda) || 0;
                        const precoB = parseFloat(b.preco_venda) || 0;
                        return precoB - precoA;
                    });
                    break;
                case 'a-z':
                    gamesCopy.sort((a, b) => a.nome.toLowerCase().localeCompare(b.nome.toLowerCase()));
                    break;
                case 'z-a':
                    gamesCopy.sort((a, b) => b.nome.toLowerCase().localeCompare(a.nome.toLowerCase()));
                    break;
                case 'relevancia':
                default:
                    break;
            }

            return gamesCopy;
        }

        function applyFilters() {
            const searchTerm = searchInputEl.value.toLowerCase();
            const selectedCategory = categoryFilterEl.value;

            filteredGames = allGames.filter(game => {
                const matchesSearch = game.nome.toLowerCase().includes(searchTerm);
                const matchesCategory = !selectedCategory || game.categoria === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            filteredGames = sortGames(filteredGames);

            updateCategoryChipsActive();
            renderGames();
        }

        function renderGames() {
            gamesContainerEl.innerHTML = '';

            if (filteredGames.length === 0) {
                emptyStateEl.style.display = 'block';
                return;
            }

            emptyStateEl.style.display = 'none';

            filteredGames.forEach(game => {
                const card = createGameCard(game);
                gamesContainerEl.appendChild(card);
            });
        }

        function convertImageUrl(urlOriginal) {
            if (!urlOriginal || !urlOriginal.trim()) return null;

            const url = urlOriginal.trim();
            const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);

            if (match && match[1]) {
                return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400`;
            }

            return url;
        }

        function createGameCard(game) {
            const card = document.createElement('div');
            card.className = 'game-card';

            const isAvailable = game.disponivel && (game.disponivel.toLowerCase() === 'sim' || game.disponivel === '1');
            const badgeClass = isAvailable ? 'badge-available' : 'badge-unavailable';
            const badgeText = isAvailable ? 'Disponível' : 'Indisponível';

            const preco = parseFloat(game.preco_venda) || 0;
            const precoFormatado = preco.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            });

            const jogadores = game.jogadores_min || '?';
            const jogadoresMax = game.jogadores_max || '?';
            const rangeJogadores = `${jogadores}-${jogadoresMax}`;

            const imagemUrl = convertImageUrl(game.imagem);

            card.innerHTML = `
                <div class="card-image" id="card-image-${Math.random()}"></div>
                <div class="card-header">
                    <h3 class="card-title">${escapeHtml(game.nome)}</h3>
                    <span class="badge ${badgeClass}">${badgeText}</span>
                </div>
                <div class="card-content">
                    <div class="category-tag">${escapeHtml(game.categoria)}</div>
                    <div class="info-row">
                        <span class="info-label">Jogadores:</span>
                        <span class="info-value">${rangeJogadores}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Disponível:</span>
                        <span class="info-value">${game.quantidade_disponivel} un.</span>
                    </div>
                    <div class="price">${precoFormatado}</div>
                </div>
                <div class="card-footer">
                    <button class="btn-whatsapp" onclick="abrirWhatsApp('${escapeHtml(game.nome)}')" aria-label="Entrar em contato sobre ${escapeHtml(game.nome)} via WhatsApp">
                        Tenho interesse
                    </button>
                </div>
            `;

            const cardImageDiv = card.querySelector('.card-image');
            if (imagemUrl) {
                const img = document.createElement('img');
                img.src = imagemUrl;
                img.alt = escapeHtml(game.nome);
                img.loading = 'lazy';
                img.onerror = function() {
                    this.parentElement.innerHTML = '<div class="card-image-placeholder">' + escapeHtml(game.nome) + '</div>';
                };
                cardImageDiv.appendChild(img);
            } else {
                cardImageDiv.innerHTML = '<div class="card-image-placeholder">' + escapeHtml(game.nome) + '</div>';
            }

            return card;
        }

        function abrirWhatsApp(nomeJogo) {
            const mensagem = `Olá! Tenho interesse em comprar o jogo ${nomeJogo}. Podemos conversar?`;
            const mensagemCodificada = encodeURIComponent(mensagem);
            const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${mensagemCodificada}`;
            window.open(url, '_blank');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.toString().replace(/[&<>"']/g, m => map[m]);
        }

        function showError(message) {
            loadingEl.style.display = 'none';
            errorMessageEl.textContent = message;
            errorEl.style.display = 'block';
        }

        searchInputEl.addEventListener('input', applyFilters);
        categoryFilterEl.addEventListener('change', applyFilters);
        sortFilterEl.addEventListener('change', applyFilters);

        loadGames();
    </script>
</body>
</html>
